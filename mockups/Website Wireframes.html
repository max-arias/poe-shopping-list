<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PoE Shopping List — Website wireframe</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--wf-bg, #fdfaf3);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
        color: var(--wf-ink, #231e16);
      }

      :root,
      [data-theme="light"] {
        --wf-bg: #fdfaf3;
        --wf-frame: #1a1610;
        --wf-chrome: #eee7d8;
        --wf-footer-bg: #f2ecdd;
        --wf-section-bg: #f2ecdd;
        --wf-ink: #231e16;
        --wf-muted: #7a6f5c;
        --wf-stroke: #3a3226;
        --wf-stroke-soft: #d9cfb6;
        --wf-line: #bfb49a;
        --wf-block: #e8e0c9;
        --wf-pill-bg: #e8e0c9;
        --wf-gold: #b07e28;
        --wf-gold-edge: #7a561a;
        --wf-gold-ink: #1a1208;
        --wf-gold-ink-strong: #7a561a;
        --wf-gold-soft: #ecd9a6;
        --wf-warn-bg: #f5dfb0;
        --wf-warn-ink: #7a4a0f;
        --wf-warn-edge: #c18a38;
        --wf-good-bg: #d9e7c5;
        --wf-good-ink: #3d5a1c;
        --wf-good-edge: #7a9a4a;
      }
      [data-theme="dark"] {
        --wf-bg: #15110b;
        --wf-frame: #0a0804;
        --wf-chrome: #1f1a12;
        --wf-footer-bg: #1a160f;
        --wf-section-bg: #1c1810;
        --wf-ink: #e8dcbe;
        --wf-muted: #8a7e66;
        --wf-stroke: #3a3226;
        --wf-stroke-soft: #2a2418;
        --wf-line: #4a4030;
        --wf-block: #231e14;
        --wf-pill-bg: #231e14;
        --wf-gold: #c28a2a;
        --wf-gold-edge: #5a3f10;
        --wf-gold-ink: #140e04;
        --wf-gold-ink-strong: #e0b15a;
        --wf-gold-soft: #3a2a10;
        --wf-warn-bg: #3a2810;
        --wf-warn-ink: #e0a850;
        --wf-warn-edge: #7a5a20;
        --wf-good-bg: #1f2a14;
        --wf-good-ink: #a8c87a;
        --wf-good-edge: #4a6a2a;
      }

      body {
        background: var(--wf-bg);
        color: var(--wf-ink);
      }

      .tweaks {
        position: fixed;
        top: 16px;
        right: 16px;
        background: #fffdf6;
        border: 1px solid #1a1610;
        border-radius: 4px;
        padding: 12px 14px;
        font-size: 12px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
        z-index: 100;
        min-width: 220px;
        color: #2a2520;
      }
      .tweaks h4 {
        margin: 0 0 10px;
        font-size: 11px;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: #7a6f5c;
        font-weight: 600;
      }
      .tweaks .row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 6px 0;
      }
      .tweaks label {
        font-size: 11px;
        color: #7a6f5c;
      }
      .tweaks .seg {
        display: inline-flex;
        border: 1px solid #3a3226;
        border-radius: 2px;
        overflow: hidden;
      }
      .tweaks .seg button {
        border: 0;
        background: transparent;
        padding: 4px 10px;
        font-size: 11px;
        cursor: pointer;
        color: #2a2520;
        font-family: inherit;
      }
      .tweaks .seg button.on {
        background: #b07e28;
        color: #140e04;
        font-weight: 600;
      }

      .page-host {
        width: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
      }
      .page-host > * {
        width: 1200px;
        max-width: 100%;
      }
    </style>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root" class="page-host" data-theme="light"></div>

    <script type="text/babel" src="primitives.jsx"></script>
    <script type="text/babel" src="web-primitives.jsx"></script>
    <script type="text/babel" src="web-variations.jsx"></script>

    <script type="text/babel">
      const { V1_Classic } = window;

      function Tweaks({ theme, setTheme }) {
        return (
          <div className="tweaks">
            <h4>Tweaks</h4>
            <div className="row">
              <label>Theme</label>
              <div style={{ flex: 1 }} />
              <div className="seg">
                <button className={theme === "light" ? "on" : ""} onClick={() => setTheme("light")}>
                  Light
                </button>
                <button className={theme === "dark" ? "on" : ""} onClick={() => setTheme("dark")}>
                  Dark
                </button>
              </div>
            </div>
          </div>
        );
      }

      function App() {
        const [theme, setTheme] = React.useState(
          () => localStorage.getItem("web-theme") || "light",
        );

        React.useEffect(() => {
          document.getElementById("root").setAttribute("data-theme", theme);
          document.body.setAttribute("data-theme", theme);
          localStorage.setItem("web-theme", theme);
        }, [theme]);

        return (
          <>
            <Tweaks theme={theme} setTheme={setTheme} />
            <V1_Classic theme={theme} setTheme={setTheme} />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
