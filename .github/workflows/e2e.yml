name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - "apps/extension/**"
      - "apps/e2e/**"
      - "packages/schema/**"
      - "packages/trade-dom/**"
      - "packages/tokens/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/extension/**"
      - "apps/e2e/**"
      - "packages/schema/**"
      - "packages/trade-dom/**"
      - "packages/tokens/**"
      - ".github/workflows/e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - run: vp install

      - name: Build extension
        run: vp run --filter @poe-sl/extension build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/e2e

      - name: Run E2E tests
        run: xvfb-run npx playwright test
        working-directory: apps/e2e

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: apps/e2e/test-results
          retention-days: 7
